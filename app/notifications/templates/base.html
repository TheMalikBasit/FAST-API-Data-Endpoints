<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{ subject }}</title>
</head>
<body style="margin:0;padding:0;background:#0f0a1f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#e8e6f0;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0f0a1f;padding:32px 12px;">
  <tr><td align="center">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;background:#1a1233;border-radius:16px;overflow:hidden;border:1px solid rgba(139,92,246,0.25);box-shadow:0 8px 32px rgba(0,0,0,0.4);">
      <!-- Header -->
      <tr><td style="padding:24px 28px;background:linear-gradient(135deg,#8B5CF6 0%,#10B981 100%);">
        <table role="presentation" width="100%"><tr>
          <td style="font-size:18px;font-weight:700;color:#fff;letter-spacing:0.5px;">⚡ WSMS</td>
          <td align="right" style="font-size:11px;color:rgba(255,255,255,0.85);text-transform:uppercase;letter-spacing:1.5px;">{{ header_label or 'Safety Alert' }}</td>
        </tr></table>
      </td></tr>

      <!-- Body -->
      <tr><td style="padding:32px 28px;">
        {% block content %}{% endblock %}
      </td></tr>

      <!-- Footer -->
      <tr><td style="padding:20px 28px;background:#120a26;border-top:1px solid rgba(139,92,246,0.15);font-size:11px;color:#8B7FB0;line-height:1.6;">
        You're receiving this because you have notifications enabled in your WSMS profile.
        {% if unsubscribe_url %}
          <br/><a href="{{ unsubscribe_url }}" style="color:#A78BFA;text-decoration:underline;">Unsubscribe</a>
          &middot;
        {% endif %}
        <a href="{{ app_url }}/dashboard/profile-settings/notifications" style="color:#A78BFA;text-decoration:underline;">Manage preferences</a>
      </td></tr>
    </table>
    <div style="margin-top:16px;font-size:10px;color:#5e5380;letter-spacing:1px;text-transform:uppercase;">Worker Safety Management System</div>
  </td></tr>
</table>
</body>
</html>
